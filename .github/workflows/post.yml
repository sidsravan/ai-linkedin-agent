name: Auto LinkedIn Post

on:
  schedule:
    - cron: "0 9 * * FRI"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Decode LINKEDIN_AUTH to auth.json
        if: secrets.LINKEDIN_AUTH != ''
        run: |
          python - <<'PY'
          import os, base64, sys
          s = os.getenv("LINKEDIN_AUTH")
          if not s:
              print("LINKEDIN_AUTH not set")
              sys.exit(0)
          open("auth.json","wb").write(base64.b64decode(s))
          print("auth.json written")
          PY

      - name: Run bot
        run: python src/main.py

      - name: Upload debug_login
        uses: actions/upload-artifact@v4
        with:
          name: debug-login
          path: debug_login.png

      - name: Upload debug_feed
        uses: actions/upload-artifact@v4
        with:
          name: debug-feed
          path: debug_feed.png

      - name: Upload debug_post_dialog
        uses: actions/upload-artifact@v4
        with:
          name: debug-dialog
          path: debug_post_dialog.png

      - name: Upload debug_post_done
        uses: actions/upload-artifact@v4
        with:
          name: debug-done
          path: debug_post_done.png
