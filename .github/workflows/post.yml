name: Auto LinkedIn Post

on:
  schedule:
    - cron: "0 9 * * FRI"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # - name: Refresh LinkedIn auth.json
      #   env:
      #     LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
      #     LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
      #   run: python save_auth.py

      - name: Run bot
        run: python src/main.py

      # Debug artifacts
      - name: Upload login screenshot
        uses: actions/upload-artifact@v4
        with:
          name: debug-login
          path: debug_login.png

      - name: Upload feed screenshot
        uses: actions/upload-artifact@v4
        with:
          name: debug-feed
          path: debug_feed.png

      - name: Upload post dialog screenshot
        uses: actions/upload-artifact@v4
        with:
          name: debug-dialog
          path: debug_post_dialog.png

      - name: Upload final post screenshot
        uses: actions/upload-artifact@v4
        with:
          name: debug-done
          path: debug_post_done.png